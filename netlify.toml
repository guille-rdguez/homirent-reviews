[build]
  publish = "."

[functions]
  directory = "netlify/functions"

[functions."cloudbeds-sync-cron"]
  schedule = "0 12 * * *"

[[redirects]]
  from = "/api/dashboard-login"
  to = "/.netlify/functions/dashboard-login"
  status = 200

[[redirects]]
  from = "/api/dashboard-session"
  to = "/.netlify/functions/dashboard-session"
  status = 200

[[redirects]]
  from = "/api/dashboard-data"
  to = "/.netlify/functions/dashboard-data"
  status = 200

[[redirects]]
  from = "/api/dashboard-create-property"
  to = "/.netlify/functions/dashboard-create-property"
  status = 200

[[redirects]]
  from = "/api/dashboard-delete-review"
  to = "/.netlify/functions/dashboard-delete-review"
  status = 200

[[redirects]]
  from = "/api/dashboard-logout"
  to = "/.netlify/functions/dashboard-logout"
  status = 200

[[redirects]]
  from = "/api/internal/google-find-place-ids"
  to = "/.netlify/functions/google-find-place-ids"
  status = 200

[[redirects]]
  from = "/api/internal/google-reviews-sync"
  to = "/.netlify/functions/google-reviews-sync"
  status = 200

[[redirects]]
  from = "/api/dashboard-google-reviews"
  to = "/.netlify/functions/dashboard-google-reviews"
  status = 200

[[redirects]]
  from = "/api/dashboard-booking-data"
  to = "/.netlify/functions/dashboard-booking-data"
  status = 200

[[redirects]]
  from = "/api/dashboard-booking-preview"
  to = "/.netlify/functions/dashboard-booking-preview"
  status = 200

[[redirects]]
  from = "/api/dashboard-booking-import"
  to = "/.netlify/functions/dashboard-booking-import"
  status = 200

[functions."google-reviews-cron"]
  schedule = "0 13 * * *"

[[redirects]]
  from = "/api/dashboard-reservations"
  to = "/.netlify/functions/dashboard-reservations"
  status = 200

[[redirects]]
  from = "/api/internal/cloudbeds-sync"
  to = "/.netlify/functions/cloudbeds-sync"
  status = 200

[[redirects]]
  from = "/api/inbound/email"
  to = "/.netlify/functions/inbound-email"
  status = 200

[[redirects]]
  from = "/api/internal/process-inbound-message"
  to = "/.netlify/functions/process-inbound-message"
  status = 200

[[redirects]]
  from = "/api/internal/reprocess-inbound-batch"
  to = "/.netlify/functions/reprocess-inbound-batch"
  status = 200

[[redirects]]
  from = "/api/internal/reset-inbound-matched"
  to = "/.netlify/functions/reset-inbound-matched"
  status = 200

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"
